## Final Structure:
```
.github/ISSUE_TEMPLATE/
├── bug_report.yml              ← 🐛 Bug Reports
├── feature_request.yml         ← ✨ Feature Requests
├── translation.yml             ← 🌐 Translations (schon da)
├── integration_request.yml     ← 🔌 Integration Requests
├── question.yml                ← ❓ Questions/Support
├── documentation.yml           ← 📖 Doc Issues
└── config.yml                  ← ⚙️ Config (blank issue + links)
```

**Auswahl-Screen sieht dann so aus:**
```
┌──────────────────────────────────────┐
│  🐛 Bug Report                       │
│  🌐 Add Translation                  │
│  ✨ Feature Request                  │
│  🔌 Integration Request              │
│  ❓ Question / Support               │
│  📖 Documentation Issue              │
│  💬 GitHub Discussions (link)       │
│  📋 Open a blank issue              │
└──────────────────────────────────────┘