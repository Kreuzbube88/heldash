name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: Which area does this feature relate to?
      options:
        - Dashboard / UI
        - Docker Integration
        - Home Assistant Integration
        - Unraid Integration
        - Media (Radarr/Sonarr/etc.)
        - Widgets
        - Network Monitor
        - Backup Center
        - User Management / Auth
        - Settings / Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem does this feature solve? Why do you need it?
      placeholder: |
        I often need to manually restart multiple containers at once.
        Currently I have to restart them one by one which is time-consuming.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: |
        Add a "Bulk Actions" button in Docker page that allows selecting
        multiple containers and restarting them all at once.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions have you thought about?
      placeholder: Using Portainer / CLI scripts / other workarounds

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to similar features in other tools
      placeholder: Drag & drop images or paste links here